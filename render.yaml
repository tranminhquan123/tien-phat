services:
  - type: web
    name: tien-phat-api
    runtime: node
    rootDir: server
    buildCommand: npm ci --include=dev && npm run db:generate && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
