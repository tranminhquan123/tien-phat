services:
  - type: web
    name: tien-phat-api
    runtime: node
    rootDir: server
    buildCommand: npm ci --include=dev && npm run db:generate && npm run db:deploy && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false

  - type: web
    name: tien-phat-web
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://tien-phat-api.onrender.com/api
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
