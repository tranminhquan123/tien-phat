name: Admin analysis integration

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      database:
        image: postgres:16
        env:
          POSTGRES_USER: runner
          POSTGRES_DB: tien_phat_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U runner -d tien_phat_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://runner@localhost:5432/tien_phat_test
      CLIENT_URL: http://localhost:5173
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - run: npm run build
      - run: npm run db:push -- --skip-generate
      - run: node scripts/ci-ai-smoke.js
