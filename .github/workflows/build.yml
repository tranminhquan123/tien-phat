name: Build verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client:
    name: Build client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  server:
    name: Test, build and smoke-test server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tien_phat
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d tien_phat"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/tien_phat
      JWT_SECRET: ci-only-secret-at-least-32-characters-long
      CLIENT_URL: http://localhost:5173
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Test advisory engine
        run: npm test

      - name: Build
        run: npm run build

      - name: Apply Prisma schema to test database
        run: npm run db:push -- --skip-generate

      - name: Smoke-test health, chat recommendation and handoff
        run: node scripts/ci-smoke.js

      - name: Smoke-test mini CRM
        run: node scripts/ci-crm-smoke.js
