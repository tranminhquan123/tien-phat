name: Build verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client:
    name: Build client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  server:
    name: Test and build server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/tien_phat
      JWT_SECRET: ci-only-secret-at-least-32-characters-long
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Test advisory engine
        run: npm test

      - name: Build
        run: npm run build
